version: '3.8'

services:
  frontend:
    build:
      context: ./lineage-frontend
      dockerfile: Dockerfile
    container_name: lineage-frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=${API_BASE_URL:-http://localhost:8000}
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => {if (r.statusCode !== 200) throw new Error(r.statusCode)})"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - lineage-network

  backend:
    build:
      context: ./lineage-backend
      dockerfile: Dockerfile
    container_name: lineage-backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-mssql://sa:YourPassword123@mssql:1433/lineage_db}
      - NEO4J_URL=${NEO4J_URL:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-password}
      - ENVIRONMENT=${ENVIRONMENT:-development}
    depends_on:
      - mssql
      - neo4j
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - lineage-network

  mssql:
    image: mcr.microsoft.com/mssql/server:2019-latest
    container_name: lineage-mssql
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "${MSSQL_PASSWORD:-YourPassword123}"
      ACCEPT_EULA: "Y"
    volumes:
      - mssql_data:/var/opt/mssql
      - ./lineage-backend/sql:/sql
    networks:
      - lineage-network
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools/bin/sqlcmd -S localhost -U sa -P ${MSSQL_PASSWORD:-YourPassword123} -Q 'SELECT 1' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

  neo4j:
    image: neo4j:latest
    container_name: lineage-neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: "${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-password}"
      NEO4J_dbms_memory_heap_max__size: 2G
      NEO4J_dbms_memory_pagecache_size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - lineage-network
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -a bolt://localhost:7687 -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-password} 'RETURN 1' || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  mssql_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local

networks:
  lineage-network:
    driver: bridge
