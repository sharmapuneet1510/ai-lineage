<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Lineage Inspector</title>
<style>
  /* ---- token system: instrument / forensic ---------------------------- */
  :root {
    color-scheme: light dark;
    --bg: #0c1018;
    --surface: #141a26;
    --surface-2: #1b2333;
    --raised: #232d40;
    --ink: #e7ebf3;
    --ink-dim: #b7c0d4;
    --muted: #838da4;
    --line: rgba(150,170,210,.13);
    --line-strong: rgba(150,170,210,.24);
    --accent: #3fb6c4;
    --accent-ink: #071417;
    --gap: #e0a35e;
    --verified: #57c48d;
    --danger: #e0645e;
    --lang-java: #6ea8fe;
    --lang-xslt: #b28bff;
    --lang-xsd: #62c98a;
    --lang-xml: #4db6c4;
    --lang-document: #d9a066;
    --shadow: 0 1px 0 rgba(255,255,255,.03) inset, 0 8px 30px rgba(0,0,0,.35);
    --mono: ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
    --sans: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #eaeef4;
      --surface: #ffffff;
      --surface-2: #f3f6fb;
      --raised: #e9eef6;
      --ink: #182030;
      --ink-dim: #3a465c;
      --muted: #5c667c;
      --line: rgba(30,50,90,.13);
      --line-strong: rgba(30,50,90,.22);
      --accent: #1a8a98;
      --accent-ink: #ffffff;
      --gap: #b06f27;
      --verified: #2f9668;
      --danger: #bf4b45;
      --lang-java: #2f6fe0;
      --lang-xslt: #7b52d6;
      --lang-xsd: #2e9560;
      --lang-xml: #1a8a98;
      --lang-document: #a9702c;
      --shadow: 0 1px 2px rgba(20,40,80,.06), 0 10px 30px rgba(20,40,80,.08);
    }
  }
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #0c1018; --surface: #141a26; --surface-2: #1b2333; --raised: #232d40;
    --ink: #e7ebf3; --ink-dim: #b7c0d4; --muted: #838da4;
    --line: rgba(150,170,210,.13); --line-strong: rgba(150,170,210,.24);
    --accent: #3fb6c4; --accent-ink: #071417; --gap: #e0a35e; --verified: #57c48d; --danger: #e0645e;
    --lang-java: #6ea8fe; --lang-xslt: #b28bff; --lang-xsd: #62c98a; --lang-xml: #4db6c4; --lang-document: #d9a066;
    --shadow: 0 1px 0 rgba(255,255,255,.03) inset, 0 8px 30px rgba(0,0,0,.35);
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #eaeef4; --surface: #ffffff; --surface-2: #f3f6fb; --raised: #e9eef6;
    --ink: #182030; --ink-dim: #3a465c; --muted: #5c667c;
    --line: rgba(30,50,90,.13); --line-strong: rgba(30,50,90,.22);
    --accent: #1a8a98; --accent-ink: #ffffff; --gap: #b06f27; --verified: #2f9668; --danger: #bf4b45;
    --lang-java: #2f6fe0; --lang-xslt: #7b52d6; --lang-xsd: #2e9560; --lang-xml: #1a8a98; --lang-document: #a9702c;
    --shadow: 0 1px 2px rgba(20,40,80,.06), 0 10px 30px rgba(20,40,80,.08);
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: var(--sans);
    background: var(--bg);
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  .mono { font-family: var(--mono); }
  .label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: .11em;
    text-transform: uppercase;
    color: var(--muted);
  }
  button { font-family: inherit; color: inherit; cursor: pointer; }
  ::selection { background: color-mix(in srgb, var(--accent) 40%, transparent); }

  /* ---- shell ---------------------------------------------------------- */
  .app { display: flex; flex-direction: column; height: 100vh; }

  .topbar {
    display: flex; align-items: center; gap: 16px;
    padding: 0 16px; height: 52px; flex-shrink: 0;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    position: relative; z-index: 20;
  }
  .brand { display: flex; align-items: baseline; gap: 10px; }
  .brand .mark {
    font-family: var(--mono); font-weight: 600; letter-spacing: .02em;
    font-size: 14px;
  }
  .brand .mark b { color: var(--accent); }
  .brand .sub { font-size: 11px; color: var(--muted); }

  .source-chip {
    display: flex; align-items: center; gap: 8px;
    font-family: var(--mono); font-size: 11px; color: var(--ink-dim);
    padding: 5px 10px; border: 1px solid var(--line);
    border-radius: 6px; background: var(--surface-2);
  }
  .source-chip .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--muted); flex: none; }
  .source-chip.live .dot { background: var(--verified); box-shadow: 0 0 0 3px color-mix(in srgb, var(--verified) 22%, transparent); }
  .source-chip.demo .dot { background: var(--gap); }

  .search-wrap { flex: 1; max-width: 460px; position: relative; }
  .search {
    width: 100%; height: 34px; padding: 0 12px 0 32px;
    background: var(--surface-2); border: 1px solid var(--line);
    border-radius: 8px; color: var(--ink); font-family: var(--mono); font-size: 12px;
  }
  .search::placeholder { color: var(--muted); }
  .search:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 18%, transparent); }
  .search-ico { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .results {
    position: absolute; top: 40px; left: 0; right: 0; z-index: 40;
    background: var(--surface); border: 1px solid var(--line-strong);
    border-radius: 8px; box-shadow: var(--shadow);
    max-height: 60vh; overflow: auto; padding: 6px; display: none;
  }
  .results.open { display: block; }
  .results .grp { padding: 8px 8px 3px; }
  .res {
    display: flex; align-items: center; gap: 10px;
    padding: 7px 9px; border-radius: 6px; cursor: pointer;
    font-family: var(--mono); font-size: 12px;
  }
  .res:hover, .res.active { background: var(--surface-2); }
  .res .kindchip { font-size: 9px; }

  .spacer { flex: 1; }
  .btn {
    display: inline-flex; align-items: center; gap: 7px;
    height: 34px; padding: 0 13px; border-radius: 8px;
    border: 1px solid var(--line-strong); background: var(--surface-2);
    font-size: 12.5px; font-weight: 550; white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); }
  .btn.primary { background: var(--accent); color: var(--accent-ink); border-color: transparent; }
  .btn.icon { width: 34px; padding: 0; justify-content: center; }

  /* ---- three-panel body ---------------------------------------------- */
  .body { flex: 1; display: grid; grid-template-columns: 244px 1fr 300px; min-height: 0; }
  .panel { min-height: 0; overflow: auto; }
  .rail-l { background: var(--surface); border-right: 1px solid var(--line); }
  .center { background: var(--bg); display: flex; flex-direction: column; }
  .rail-r { background: var(--surface); border-left: 1px solid var(--line); }

  .rail-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px 8px; position: sticky; top: 0;
    background: var(--surface); z-index: 5;
  }
  .filter {
    margin: 0 12px 8px; width: calc(100% - 24px); height: 30px; padding: 0 10px;
    background: var(--surface-2); border: 1px solid var(--line); border-radius: 7px;
    color: var(--ink); font-family: var(--mono); font-size: 12px;
  }
  .filter:focus { outline: none; border-color: var(--accent); }

  .chips { display: flex; gap: 6px; padding: 0 12px 10px; flex-wrap: wrap; }
  .chip {
    font-family: var(--mono); font-size: 10px; letter-spacing: .04em;
    padding: 3px 8px; border-radius: 20px; border: 1px solid var(--line-strong);
    color: var(--muted); background: transparent; cursor: pointer;
  }
  .chip[aria-pressed="true"] { color: var(--ink); border-color: var(--accent); background: color-mix(in srgb, var(--accent) 14%, transparent); }
  .chip.gap[aria-pressed="true"] { border-color: var(--gap); background: color-mix(in srgb, var(--gap) 16%, transparent); color: var(--gap); }

  .grouphead { padding: 12px 14px 5px; display: flex; align-items: center; gap: 8px; }
  .grouphead .count { color: var(--muted); font-family: var(--mono); font-size: 10px; }

  .node-row {
    display: block; width: 100%; text-align: left;
    padding: 7px 14px; border: none; background: none;
    border-left: 2px solid transparent;
  }
  .node-row:hover { background: var(--surface-2); }
  .node-row[aria-selected="true"] { background: color-mix(in srgb, var(--accent) 12%, transparent); border-left-color: var(--accent); }
  .node-row .nm { display: flex; align-items: center; gap: 7px; font-weight: 550; }
  .node-row .meta { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-top: 1px; }
  .node-row.is-gap .nm { color: var(--gap); }

  .langdot { width: 7px; height: 7px; border-radius: 2px; flex: none; }

  /* ---- center: header + tabs + graph --------------------------------- */
  .field-head { padding: 16px 20px 0; border-bottom: 1px solid var(--line); background: var(--surface); }
  .field-title { display: flex; align-items: center; gap: 12px; }
  .field-title h1 { margin: 0; font-size: 20px; font-family: var(--mono); font-weight: 600; letter-spacing: -.01em; }
  .field-desc { color: var(--muted); font-size: 12.5px; margin: 3px 0 0; }
  .trace-line { height: 2px; margin-top: 14px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: .0; }
  .trace-line.show { animation: trace .5s ease forwards; }
  @keyframes trace { from { opacity: 0; transform: scaleX(.4); } to { opacity: .8; transform: scaleX(1); } }

  .tabs { display: flex; gap: 20px; padding: 12px 20px 0; }
  .tab {
    background: none; border: none; padding: 0 0 10px; font-size: 13px; font-weight: 550;
    color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .tab[aria-selected="true"] { color: var(--ink); border-bottom-color: var(--accent); }

  .view { padding: 22px 20px; }
  .view[hidden] { display: none; }

  /* dataflow graph: three columns */
  .flow { display: grid; grid-template-columns: 1fr auto 1fr auto 1fr; align-items: center; gap: 10px; }
  .col { display: flex; flex-direction: column; gap: 10px; min-width: 0; }
  .col.center-col { align-items: center; }
  .col-label { text-align: center; margin-bottom: 4px; }
  .arrow-col { display: flex; align-items: center; justify-content: center; color: var(--muted); }
  .arrow-col svg { width: 26px; height: 14px; }

  .gnode {
    display: block; width: 100%; text-align: left;
    padding: 10px 12px; border-radius: 9px;
    border: 1px solid var(--line-strong); background: var(--surface);
    border-left: 3px solid var(--lc, var(--accent));
    animation: pop .28s ease both;
  }
  @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }
  .gnode:hover { border-color: var(--accent); }
  .gnode[aria-selected="true"] { box-shadow: 0 0 0 2px var(--accent); }
  .gnode .gname { font-family: var(--mono); font-weight: 600; font-size: 13px; word-break: break-word; }
  .gnode .gsrc { font-family: var(--mono); font-size: 10.5px; color: var(--muted); margin-top: 3px; }
  .gnode.focus { border-left-color: var(--accent); background: color-mix(in srgb, var(--accent) 13%, var(--surface)); }
  .gnode.gap { border-style: dashed; border-color: var(--gap); border-left-color: var(--gap); background: color-mix(in srgb, var(--gap) 9%, var(--surface)); }
  .gnode.gap .gname { color: var(--gap); }
  .edge-expr { font-family: var(--mono); font-size: 10.5px; color: var(--ink-dim); margin-top: 5px; padding: 4px 6px; background: var(--surface-2); border-radius: 5px; word-break: break-word; }

  .empty-flow { color: var(--muted); font-family: var(--mono); font-size: 12px; text-align: center; padding: 40px 0; }

  /* facts table */
  .facttable { width: 100%; border-collapse: collapse; font-size: 12px; }
  .facttable th { text-align: left; font-family: var(--mono); font-size: 10px; letter-spacing: .09em; text-transform: uppercase; color: var(--muted); padding: 6px 10px; border-bottom: 1px solid var(--line); font-weight: 500; }
  .facttable td { padding: 8px 10px; border-bottom: 1px solid var(--line); vertical-align: top; font-family: var(--mono); }
  .facttable tr:hover td { background: var(--surface-2); }
  .facttable .rw { color: var(--ink-dim); }
  .facttable .coord { color: var(--muted); white-space: nowrap; }

  .kindchip { display: inline-block; font-family: var(--mono); font-size: 9.5px; letter-spacing: .04em; padding: 2px 7px; border-radius: 5px; border: 1px solid var(--lc, var(--line-strong)); color: var(--lc, var(--ink-dim)); white-space: nowrap; }

  .prov-badge { display: inline-flex; align-items: center; gap: 5px; font-family: var(--mono); font-size: 10px; padding: 2px 7px; border-radius: 20px; }
  .prov-badge.parsed { color: var(--accent); background: color-mix(in srgb, var(--accent) 15%, transparent); }
  .prov-badge.verified { color: var(--verified); background: color-mix(in srgb, var(--verified) 15%, transparent); }
  .prov-badge.gap { color: var(--gap); background: color-mix(in srgb, var(--gap) 15%, transparent); }

  /* ---- right rail: evidence + gaps ----------------------------------- */
  .rail-r .sect { padding: 14px; border-bottom: 1px solid var(--line); }
  .ev-card { border: 1px solid var(--line); border-radius: 9px; padding: 10px; margin-top: 9px; background: var(--surface-2); }
  .ev-card .ev-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .ev-code { font-family: var(--mono); font-size: 11.5px; background: var(--bg); border: 1px solid var(--line); border-radius: 6px; padding: 7px 9px; margin-top: 8px; overflow-x: auto; white-space: pre; color: var(--ink-dim); }
  .stamp { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 8px; display: flex; flex-wrap: wrap; gap: 4px 8px; }
  .stamp b { color: var(--ink-dim); font-weight: 600; }
  .ev-empty { color: var(--muted); font-family: var(--mono); font-size: 11.5px; padding: 6px 0; }

  .gap-card { border-left: 3px solid var(--gap); background: color-mix(in srgb, var(--gap) 8%, var(--surface-2)); border-radius: 7px; padding: 9px 11px; margin-top: 9px; }
  .gap-card .gc-file { font-family: var(--mono); font-size: 11.5px; color: var(--gap); font-weight: 600; }
  .gap-card .gc-msg { font-size: 11.5px; color: var(--ink-dim); margin-top: 3px; }
  .gap-card .gc-sev { font-family: var(--mono); font-size: 9.5px; letter-spacing: .06em; text-transform: uppercase; }

  .kv { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 11.5px; padding: 3px 0; }
  .kv .k { color: var(--muted); }
  .kv .v { color: var(--ink); font-variant-numeric: tabular-nums; }

  /* ---- overlays ------------------------------------------------------- */
  .banner {
    display: none; align-items: center; gap: 10px;
    padding: 8px 16px; background: color-mix(in srgb, var(--gap) 14%, var(--surface));
    border-bottom: 1px solid color-mix(in srgb, var(--gap) 40%, transparent);
    font-size: 12.5px; color: var(--ink-dim);
  }
  .banner.show { display: flex; }
  .banner .close { margin-left: auto; background: none; border: none; color: var(--muted); font-size: 16px; }

  .drop-hint {
    position: fixed; inset: 0; z-index: 60; display: none;
    align-items: center; justify-content: center;
    background: color-mix(in srgb, var(--accent) 18%, rgba(0,0,0,.5));
    backdrop-filter: blur(2px);
  }
  .drop-hint.show { display: flex; }
  .drop-hint .box { border: 2px dashed var(--accent); border-radius: 14px; padding: 40px 60px; background: var(--surface); font-family: var(--mono); }

  @media (max-width: 1000px) {
    .body { grid-template-columns: 1fr; grid-template-rows: auto auto auto; }
    .rail-l, .rail-r { border: none; border-bottom: 1px solid var(--line); max-height: 40vh; }
    .search-wrap { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .trace-line.show, .gnode { animation: none; opacity: 1; }
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand">
      <span class="mark">lineage<b>::</b>inspect</span>
      <span class="sub">provenance-first field tracer</span>
    </div>
    <div class="source-chip" id="sourceChip">
      <span class="dot"></span><span id="sourceText">loading…</span>
    </div>
    <div class="search-wrap">
      <svg class="search-ico" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input class="search" id="search" placeholder="search fields, symbols, files, xpaths…  (/)" autocomplete="off">
      <div class="results" id="results"></div>
    </div>
    <div class="spacer"></div>
    <button class="btn" id="loadBtn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0 4-4m-4 4-4-4"/><path d="M4 17v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2"/></svg>
      Load parse output
    </button>
    <button class="btn icon" id="themeBtn" title="Toggle theme" aria-label="Toggle theme">
      <svg id="themeIco" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2m0 16v2M4.9 4.9l1.4 1.4m11.4 11.4 1.4 1.4M2 12h2m16 0h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <input type="file" id="fileInput" accept=".jsonl,.idx,.json" multiple hidden>
  </header>

  <div class="banner" id="banner">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4m0 4h.01M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/></svg>
    <span id="bannerText">Showing sample data. Run the parser and load its output folder to inspect your own lineage.</span>
    <button class="close" id="bannerClose" aria-label="Dismiss">&times;</button>
  </div>

  <div class="body">
    <!-- LEFT: fields / subjects -->
    <aside class="panel rail-l">
      <div class="rail-head">
        <span class="label">Discovered fields</span>
        <span class="count label" id="fieldCount"></span>
      </div>
      <input class="filter" id="filter" placeholder="filter…" autocomplete="off">
      <div class="chips">
        <button class="chip" data-flt="all" aria-pressed="true">all</button>
        <button class="chip gap" data-flt="gap" aria-pressed="false">gaps</button>
      </div>
      <div id="sidebar"></div>
    </aside>

    <!-- CENTER: lineage -->
    <main class="panel center">
      <div class="field-head">
        <div class="field-title">
          <h1 id="fieldName">—</h1>
          <span id="fieldStatus"></span>
        </div>
        <p class="field-desc" id="fieldDesc"></p>
        <div class="tabs">
          <button class="tab" data-tab="graph" aria-selected="true">Lineage</button>
          <button class="tab" data-tab="facts" aria-selected="false">Facts</button>
          <button class="tab" data-tab="explain" aria-selected="false">Provenance</button>
        </div>
        <div class="trace-line" id="traceLine"></div>
      </div>

      <section class="view" id="view-graph">
        <div class="flow" id="flow"></div>
      </section>
      <section class="view" id="view-facts" hidden>
        <div style="overflow-x:auto"><table class="facttable" id="factTable"></table></div>
      </section>
      <section class="view" id="view-explain" hidden>
        <div id="explain"></div>
      </section>
    </main>

    <!-- RIGHT: evidence + gaps -->
    <aside class="panel rail-r">
      <div class="sect">
        <span class="label">Evidence</span>
        <div id="evidence"><div class="ev-empty">Select a node to inspect the fact behind it.</div></div>
      </div>
      <div class="sect">
        <span class="label">Parse gaps</span>
        <div id="gaps"></div>
      </div>
      <div class="sect">
        <span class="label">Run summary</span>
        <div id="summary"></div>
      </div>
    </aside>
  </div>
</div>

<div class="drop-hint" id="dropHint"><div class="box">Drop facts.jsonl / evidence.idx / fields.json</div></div>

<script>
"use strict";

/* -------- embedded sample data (shape matches the parser's output) ------- */
const DEMO_FACTS = [
  {kind:"call",       subject:"base",     reads:["order"],            writes:["base"],     attrs:{expr:"order.getBasePrice()"},        provenance:P("pricing-core","Pricer.java","java",{symbol:"Pricer.calc",line_start:38,hash:"a1c9"})},
  {kind:"assignment", subject:"discount", reads:["rate"],             writes:["discount"], attrs:{expr:"rate / 100.0"},                provenance:P("pricing-core","Pricer.java","java",{symbol:"Pricer.calc",line_start:39,hash:"a1c9"})},
  {kind:"assignment", subject:"price",    reads:["base","discount"],  writes:["price"],    attrs:{expr:"base * (1 - discount)"},        provenance:P("pricing-core","Pricer.java","java",{symbol:"Pricer.calc",line_start:41,hash:"a1c9"})},
  {kind:"template_match", subject:"/Order/Price", reads:["price"],     writes:["EffectiveUnitPrice"], attrs:{template:"emitPrice"},     provenance:P("pricing-core","out.xsl","xslt",{symbol:"emitPrice",xpath:"/Order/Price",line_start:22,hash:"77b0"})},
  {kind:"element_decl",subject:"EffectiveUnitPrice", reads:[],        writes:[],           attrs:{type:"xsd:decimal"},                 provenance:P("outbound","out.xsd","xsd",{symbol:"EffectiveUnitPrice",line_start:14,hash:"5d2e"})},
  {kind:"assignment", subject:"final_total", reads:["price","rounding"], writes:["final_total"], attrs:{expr:"round(price, rounding)"}, provenance:P("pricing-core","Ledger.java","java",{symbol:"Ledger.total",line_start:60,hash:"c4f1"})},
  {kind:"element",    subject:"order",    reads:[], writes:[], attrs:{path:"/order", text:null},               provenance:P("order-intake","order.xml","xml",{xpath:"/order",line_start:2,hash:"be31"})},
  {kind:"element",    subject:"price",    reads:[], writes:[], attrs:{path:"/order/price", text:"42.50"},       provenance:P("order-intake","order.xml","xml",{xpath:"/order/price",line_start:3,hash:"be31"})},
  {kind:"attribute",  subject:"currency", reads:[], writes:[], attrs:{path:"/order/price/@currency", value:"USD"}, provenance:P("order-intake","order.xml","xml",{xpath:"/order/price/@currency",line_start:3,hash:"be31"})},
];
const DEMO_ISSUES = [
  {severity:"error", parser:"java", file:"Rounding.java", message:"cannot decode as utf-8: invalid start byte 0x9f at position 512", provenance:null},
];
const DEMO_SUMMARY = {files_parsed:5, facts:DEMO_FACTS.length, facts_by_kind:tally(DEMO_FACTS,"kind"), issues_by_severity:{error:1}, duration_s:0.21};

function P(module, file, parser, extra) {
  return Object.assign({module, file, parser, parser_version:"0.1.0", source_hash:extra.hash||"", parsed_at:"2026-07-15T09:22:00Z",
    line_start:null, line_end:null, symbol:null, xpath:null}, {source_hash:extra.hash, line_start:extra.line_start??null, symbol:extra.symbol??null, xpath:extra.xpath??null});
}
function tally(arr, key){ const o={}; arr.forEach(x=>{o[x[key]]=(o[x[key]]||0)+1;}); return o; }

/* ------------------------------ state ------------------------------------ */
const state = {
  facts: [], issues: [], fields: [], summary: null,
  subjects: new Map(),   // name -> {name, module, producedBy:[i], consumedBy:[i], langs:Set}
  tokens: new Map(),     // token -> Set(factIdx)
  selected: null, live: false, tab: "graph", flt: "all",
};

const LANGS = ["java","xslt","xsd","xml","document"];
const langColor = p => LANGS.includes(p) ? `var(--lang-${p})` : "var(--accent)";

/* ------------------------- build derived indexes ------------------------- */
function rebuild() {
  state.subjects = new Map();
  state.tokens = new Map();
  const sub = (name) => {
    if (!state.subjects.has(name)) state.subjects.set(name, {name, module:null, producedBy:[], consumedBy:[], langs:new Set()});
    return state.subjects.get(name);
  };
  const addTok = (t, i) => { if(!t) return; if(!state.tokens.has(t)) state.tokens.set(t,new Set()); state.tokens.get(t).add(i); };

  state.facts.forEach((f, i) => {
    f._i = i;
    const pv = f.provenance || {};
    const prod = new Set([f.subject, ...(f.writes||[])].filter(Boolean));
    prod.forEach(n => { const s = sub(n); s.producedBy.push(i); if(!s.module) s.module = pv.module; if(pv.parser) s.langs.add(pv.parser); });
    (f.reads||[]).forEach(n => { const s = sub(n); s.consumedBy.push(i); });
    // token index mirrors backend _tokens_of
    [f.subject, ...(f.reads||[]), ...(f.writes||[]), pv.symbol, pv.xpath].forEach(t => addTok(t, i));
    if (pv.module && pv.file) addTok(`${pv.module}/${pv.file}`, i);
  });
}

/* a subject is a "gap" if it's read somewhere but nothing produces it */
function isGap(name) {
  const s = state.subjects.get(name);
  return !!s && s.producedBy.length === 0 && s.consumedBy.length > 0;
}

/* --------------------------- data loading -------------------------------- */
async function boot() {
  const got = await tryFetch();
  if (!got) loadData(DEMO_FACTS, DEMO_ISSUES, [], DEMO_SUMMARY, false);
  wireEvents();
}

async function tryFetch() {
  // "UI reads directly from the output location": look for artifacts next to the page.
  let facts = [], issues = [], fields = [], summary = null, any = false;
  try {
    const ev = await fetch("./data/evidence.idx", {cache:"no-store"});
    if (ev.ok) { const j = await ev.json(); if (Array.isArray(j.facts)) { facts = j.facts; any = true; } }
  } catch (e) {}
  if (!any) {
    try {
      const fj = await fetch("./data/facts.jsonl", {cache:"no-store"});
      if (fj.ok) { const t = await fj.text(); const p = parseJsonl(t); facts = p.facts; issues = p.issues; any = true; }
    } catch (e) {}
  }
  if (any) {
    try { const s = await fetch("./data/run_summary.json", {cache:"no-store"}); if (s.ok) summary = await s.json(); } catch(e){}
    try { const f = await fetch("./data/fields.json", {cache:"no-store"}); if (f.ok) { const j = await f.json(); if(Array.isArray(j.fields)) fields = j.fields; } } catch(e){}
    loadData(facts, issues, fields, summary, true);
    return true;
  }
  return false;
}

function parseJsonl(text) {
  const facts = [], issues = [];
  text.split(/\r?\n/).forEach(line => {
    line = line.trim(); if (!line) return;
    let o; try { o = JSON.parse(line); } catch (e) { return; }
    if (o.record === "issue") issues.push(o); else facts.push(o);
  });
  return {facts, issues};
}

function loadData(facts, issues, fields, summary, live) {
  state.facts = facts || [];
  state.issues = issues || [];
  state.fields = fields || [];
  state.summary = summary;
  state.live = live;
  rebuild();
  renderSource();
  renderSidebar();
  renderGaps();
  renderSummary();
  // pick a sensible default: a produced field with the most facts
  const first = defaultSelection();
  select(first);
  banner(!live);
}

function defaultSelection() {
  let best = null, bestN = -1;
  for (const s of state.subjects.values()) {
    if (s.producedBy.length === 0) continue;
    const n = s.producedBy.length + s.consumedBy.length;
    if (n > bestN) { bestN = n; best = s.name; }
  }
  return best;
}

/* ------------------------- ingest uploaded files ------------------------- */
function ingestFiles(fileList) {
  const jobs = [...fileList].map(file => file.text().then(text => ({name:file.name, text})));
  Promise.all(jobs).then(parts => {
    let facts = [], issues = [], fields = [], summary = null;
    parts.forEach(({name, text}) => {
      const trimmed = text.trim();
      if (name.endsWith(".jsonl") || trimmed.startsWith('{"record"')) {
        const p = parseJsonl(text); facts = facts.concat(p.facts); issues = issues.concat(p.issues); return;
      }
      let j; try { j = JSON.parse(text); } catch (e) { return; }
      if (Array.isArray(j.facts)) facts = facts.concat(j.facts);
      if (j.tokens && Array.isArray(j.facts)) {/* evidence.idx already handled by .facts */}
      if (Array.isArray(j.fields)) fields = j.fields;
      if (j.files_parsed !== undefined || j.facts_by_kind) summary = j;
    });
    if (!facts.length && !fields.length) { alert("No facts found. Load facts.jsonl or evidence.idx from your parse output folder."); return; }
    loadData(facts, issues, fields, summary, true);
  });
}

/* ------------------------------ rendering -------------------------------- */
const $ = s => document.querySelector(s);
const el = (tag, cls, html) => { const e = document.createElement(tag); if(cls) e.className = cls; if(html!=null) e.innerHTML = html; return e; };
const esc = s => String(s==null?"":s).replace(/[&<>"]/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

function renderSource() {
  const chip = $("#sourceChip"), txt = $("#sourceText");
  chip.classList.toggle("live", state.live);
  chip.classList.toggle("demo", !state.live);
  txt.textContent = state.live
    ? `${state.facts.length} facts · ${state.issues.length} gaps`
    : "sample data";
}

function sidebarFields() {
  // prefer real fields.json entries; else produced subjects
  if (state.fields.length) {
    return state.fields.map(f => ({name:f.name, module:f.module||"—", langs:f.languages||[], n:f.fact_count||0, gap:(f.status==="gap")}));
  }
  const out = [];
  for (const s of state.subjects.values()) {
    if (s.producedBy.length === 0) continue;
    out.push({name:s.name, module:s.module||"—", langs:[...s.langs], n:s.producedBy.length + s.consumedBy.length, gap:false});
  }
  // also surface gap subjects (read but never produced) so they're findable
  for (const s of state.subjects.values()) {
    if (s.producedBy.length === 0 && s.consumedBy.length > 0)
      out.push({name:s.name, module:"unresolved", langs:[], n:s.consumedBy.length, gap:true});
  }
  return out;
}

function renderSidebar() {
  const host = $("#sidebar"); host.innerHTML = "";
  const q = ($("#filter").value || "").toLowerCase();
  let items = sidebarFields().filter(it => it.name.toLowerCase().includes(q));
  if (state.flt === "gap") items = items.filter(it => it.gap);
  $("#fieldCount").textContent = items.length;

  const byMod = new Map();
  items.forEach(it => { if(!byMod.has(it.module)) byMod.set(it.module, []); byMod.get(it.module).push(it); });

  [...byMod.entries()].sort((a,b)=>a[0].localeCompare(b[0])).forEach(([mod, list]) => {
    const gh = el("div","grouphead");
    gh.innerHTML = `<span class="label">${esc(mod)}</span><span class="count">${list.length}</span>`;
    host.appendChild(gh);
    list.sort((a,b)=>b.n-a.n).forEach(it => {
      const row = el("button", "node-row" + (it.gap?" is-gap":""));
      row.setAttribute("aria-selected", it.name === state.selected);
      const dots = it.langs.map(l => `<span class="langdot" style="background:${langColor(l)}"></span>`).join("");
      const langTxt = it.gap ? "unresolved · read only" : (it.langs.join(" → ") || "—");
      row.innerHTML = `<span class="nm">${dots}${esc(it.name)}${it.gap?' &#9888;':''}</span>
                       <span class="meta">${esc(langTxt)} · ${it.n} fact${it.n===1?"":"s"}</span>`;
      row.addEventListener("click", () => select(it.name));
      host.appendChild(row);
    });
  });
  if (!items.length) host.appendChild(el("div","ev-empty","No matching fields.")).style.padding = "10px 14px";
}

function select(name) {
  if (!name) { renderEmpty(); return; }
  state.selected = name;
  document.querySelectorAll(".node-row").forEach(r => r.setAttribute("aria-selected", r.querySelector(".nm")?.textContent.replace(/\s*⚠$/,"").trim() === name));
  renderSidebar();
  renderField(name);
  const tl = $("#traceLine"); tl.classList.remove("show"); void tl.offsetWidth; tl.classList.add("show");
}

function renderEmpty() {
  $("#fieldName").textContent = "—";
  $("#fieldDesc").textContent = "";
  $("#fieldStatus").innerHTML = "";
  $("#flow").innerHTML = '<div class="empty-flow">No field selected.</div>';
}

function fieldMeta(name) {
  const fj = state.fields.find(f => f.name === name);
  return fj || null;
}

function renderField(name) {
  const s = state.subjects.get(name);
  const meta = fieldMeta(name);
  const gap = isGap(name);
  $("#fieldName").textContent = name;
  $("#fieldDesc").textContent = meta?.description || describeSubject(name);
  const status = gap ? "gap" : (meta?.status === "verified" ? "verified" : "parsed");
  $("#fieldStatus").innerHTML = `<span class="prov-badge ${status}">${status}</span>`;
  renderFlow(name);
  renderFacts(name);
  renderExplain(name);
}

function describeSubject(name) {
  const s = state.subjects.get(name); if (!s) return "";
  const langs = [...s.langs];
  if (!s.producedBy.length) return "Read by downstream logic, but no parsed source produces it — trace stops here.";
  return `${langs.join(" → ") || "—"} · produced by ${s.producedBy.length}, consumed by ${s.consumedBy.length}`;
}

/* dataflow: upstream reads → [field] → downstream consumers */
function renderFlow(name) {
  const s = state.subjects.get(name);
  const flow = $("#flow");
  if (!s) { flow.innerHTML = '<div class="empty-flow">No lineage facts for this field.</div>'; return; }

  // upstream: the reads of facts that produce `name`
  const upstream = new Map(); // readName -> {expr, parser, factIdx}
  s.producedBy.forEach(i => {
    const f = state.facts[i];
    (f.reads||[]).forEach(r => { if(!upstream.has(r)) upstream.set(r, {name:r, parser:f.provenance?.parser, expr:f.attrs?.expr, factIdx:i}); });
  });
  // downstream: facts that read `name` → their subject/writes
  const downstream = new Map();
  s.consumedBy.forEach(i => {
    const f = state.facts[i];
    [f.subject, ...(f.writes||[])].filter(Boolean).forEach(d => { if(d!==name && !downstream.has(d)) downstream.set(d, {name:d, parser:f.provenance?.parser, expr:f.attrs?.expr, factIdx:i}); });
  });

  const centerParser = s.producedBy.length ? state.facts[s.producedBy[0]].provenance?.parser : null;

  const upCol = el("div","col");
  upCol.appendChild(labelCol(upstream.size ? "derives from" : "source"));
  if (!upstream.size) upCol.appendChild(hint("origin — no upstream reads"));
  [...upstream.values()].forEach(u => upCol.appendChild(flowNode(u, isGap(u.name))));

  const midCol = el("div","col center-col");
  midCol.appendChild(labelCol("field"));
  midCol.appendChild(flowNode({name, parser:centerParser}, false, true));

  const downCol = el("div","col");
  downCol.appendChild(labelCol(downstream.size ? "feeds into" : "output"));
  if (!downstream.size) downCol.appendChild(hint("terminal — nothing consumes it yet"));
  [...downstream.values()].forEach(d => downCol.appendChild(flowNode(d, false)));

  flow.innerHTML = "";
  flow.appendChild(upCol);
  flow.appendChild(arrow());
  flow.appendChild(midCol);
  flow.appendChild(arrow());
  flow.appendChild(downCol);
}

function labelCol(t){ return el("div","col-label label", esc(t)); }
function hint(t){ const e = el("div","gnode"); e.style.borderStyle="dashed"; e.style.opacity=".6"; e.innerHTML = `<div class="gsrc">${esc(t)}</div>`; return e; }
function arrow(){ const e = el("div","arrow-col"); e.innerHTML = '<svg viewBox="0 0 26 14" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M1 7h22m0 0-5-5m5 5-5 5"/></svg>'; return e; }

function flowNode(n, gap, focus) {
  const b = el("button", "gnode" + (gap?" gap":"") + (focus?" focus":""));
  b.style.setProperty("--lc", gap ? "var(--gap)" : langColor(n.parser));
  const f = n.factIdx!=null ? state.facts[n.factIdx] : null;
  const src = gap ? "no producing fact"
            : f ? coord(f.provenance)
            : (n.parser ? n.parser : "");
  b.innerHTML = `<div class="gname">${esc(n.name)}</div>${src?`<div class="gsrc">${esc(src)}</div>`:""}` +
                (n.expr && !gap ? `<div class="edge-expr">${esc(n.expr)}</div>` : "");
  b.addEventListener("click", () => {
    if (gap) { showGapEvidence(n.name); return; }
    if (f) showEvidence([n.factIdx]);
    if (state.subjects.has(n.name) && state.subjects.get(n.name).producedBy.length) select(n.name);
  });
  return b;
}

function coord(pv) {
  if (!pv) return "";
  const loc = pv.symbol ? pv.symbol + (pv.line_start?`:${pv.line_start}`:"")
            : pv.xpath ? pv.xpath
            : pv.file + (pv.line_start?`:${pv.line_start}`:"");
  return `${pv.file} · ${loc}`;
}

/* facts tab */
function renderFacts(name) {
  const s = state.subjects.get(name);
  const idxs = s ? [...new Set([...s.producedBy, ...s.consumedBy])] : [];
  const t = $("#factTable");
  t.innerHTML = "<thead><tr><th>kind</th><th>reads</th><th>writes</th><th>coordinate</th></tr></thead>";
  const tb = el("tbody");
  idxs.forEach(i => {
    const f = state.facts[i], pv = f.provenance||{};
    const tr = el("tr");
    tr.innerHTML =
      `<td><span class="kindchip" style="--lc:${langColor(pv.parser)}">${esc(f.kind)}</span></td>`+
      `<td class="rw">${esc((f.reads||[]).join(", ")) || "—"}</td>`+
      `<td class="rw">${esc((f.writes||[]).join(", ")) || "—"}</td>`+
      `<td class="coord">${esc(coord(pv))}</td>`;
    tr.addEventListener("click", () => showEvidence([i]));
    tb.appendChild(tr);
  });
  if (!idxs.length) tb.innerHTML = `<tr><td colspan="4" class="ev-empty">No facts.</td></tr>`;
  t.appendChild(tb);
}

/* provenance / explanation tab */
function renderExplain(name) {
  const s = state.subjects.get(name);
  const host = $("#explain"); host.innerHTML = "";
  if (!s) { host.innerHTML = '<div class="ev-empty">No provenance.</div>'; return; }
  const idxs = [...new Set([...s.producedBy, ...s.consumedBy])];
  host.appendChild(el("p", "field-desc", `Every statement below is a fact a parser literally observed in source — nothing here is inferred. ${idxs.length} fact${idxs.length===1?"":"s"} reference this field across ${new Set(idxs.map(i=>state.facts[i].provenance?.module)).size} module(s).`));
  idxs.forEach(i => host.appendChild(evCard(i)));
  if (isGap(name)) {
    const g = el("div","gap-card");
    g.innerHTML = `<div class="gc-file">trace incomplete</div><div class="gc-msg">This field is read downstream but no parsed source produces it. The producing file may have failed to parse — see Parse gaps.</div>`;
    host.appendChild(g);
  }
}

/* right rail: evidence */
function showEvidence(idxs) {
  const host = $("#evidence"); host.innerHTML = "";
  if (!idxs || !idxs.length) { host.innerHTML = '<div class="ev-empty">Select a node to inspect the fact behind it.</div>'; return; }
  idxs.forEach(i => host.appendChild(evCard(i)));
}
function showGapEvidence(readName) {
  const host = $("#evidence");
  host.innerHTML = `<div class="gap-card"><div class="gc-file">${esc(readName)}</div><div class="gc-msg">No fact produces this value. The parser never saw it — most often because the source file failed to parse. This is a recorded gap, not a guess.</div></div>`;
}
function evCard(i) {
  const f = state.facts[i], pv = f.provenance || {};
  const c = el("div","ev-card");
  const payload = f.attrs?.expr || f.attrs?.template || f.attrs?.value || f.attrs?.text || f.attrs?.type || f.attrs?.path || "";
  c.innerHTML =
    `<div class="ev-top"><span class="kindchip" style="--lc:${langColor(pv.parser)}">${esc(f.kind)}</span>`+
    `<span class="prov-badge parsed">parsed</span></div>`+
    (payload ? `<div class="ev-code">${esc(payload)}</div>` : "")+
    `<div class="stamp">`+
      `<span><b>${esc(pv.file||"?")}</b>${pv.line_start?":"+pv.line_start:""}</span>`+
      (pv.symbol?`<span>${esc(pv.symbol)}</span>`:"")+
      (pv.xpath?`<span>${esc(pv.xpath)}</span>`:"")+
      (pv.source_hash?`<span>#${esc(pv.source_hash)}</span>`:"")+
      `<span>${esc(pv.parser||"")}</span>`+
    `</div>`;
  return c;
}

/* right rail: gaps */
function renderGaps() {
  const host = $("#gaps"); host.innerHTML = "";
  const untraceable = [...state.subjects.values()].filter(s => s.producedBy.length===0 && s.consumedBy.length>0).length;
  if (!state.issues.length && !untraceable) { host.innerHTML = '<div class="ev-empty">No gaps — every referenced value has a source.</div>'; return; }
  state.issues.forEach(is => {
    const g = el("div","gap-card");
    g.innerHTML = `<div class="ev-top"><span class="gc-file">${esc(is.file)}</span><span class="gc-sev" style="color:var(--${is.severity==="error"?"gap":"muted"})">${esc(is.severity)}</span></div>`+
                  `<div class="gc-msg">${esc(is.message)}</div>`;
    host.appendChild(g);
  });
  if (untraceable) {
    const g = el("div","gap-card");
    g.innerHTML = `<div class="gc-msg"><b style="color:var(--gap)">${untraceable}</b> value${untraceable===1?"":"s"} read downstream with no producing fact.</div>`;
    host.appendChild(g);
  }
}

function renderSummary() {
  const host = $("#summary"); host.innerHTML = "";
  const s = state.summary;
  if (!s) { host.innerHTML = '<div class="ev-empty">No run summary loaded.</div>'; return; }
  const rows = [
    ["files parsed", s.files_parsed],
    ["facts", s.facts ?? state.facts.length],
    ["duration", (s.duration_s!=null? s.duration_s+"s" : "—")],
  ];
  rows.forEach(([k,v]) => { const r = el("div","kv"); r.innerHTML = `<span class="k">${k}</span><span class="v">${esc(v)}</span>`; host.appendChild(r); });
  const byKind = s.facts_by_kind || tally(state.facts,"kind");
  Object.entries(byKind).sort((a,b)=>b[1]-a[1]).forEach(([k,v]) => {
    const r = el("div","kv"); r.innerHTML = `<span class="k">${esc(k)}</span><span class="v">${v}</span>`; host.appendChild(r);
  });
}

/* --------------------------- search -------------------------------------- */
function runSearch(q) {
  const box = $("#results");
  q = q.trim().toLowerCase();
  if (!q) { box.classList.remove("open"); return; }
  const groups = {field:[], symbol:[], file:[], xpath:[]};
  for (const [tok, idxs] of state.tokens) {
    if (!tok.toLowerCase().includes(q)) continue;
    let g = "field";
    if (tok.startsWith("/") ) g = "xpath";
    else if (tok.includes("/") && /\.\w+$/.test(tok)) g = "file";
    else if (/[.#]/.test(tok) && !state.subjects.has(tok)) g = "symbol";
    groups[g].push({tok, idxs:[...idxs]});
    if (Object.values(groups).reduce((a,x)=>a+x.length,0) > 40) break;
  }
  box.innerHTML = "";
  let any = false;
  const order = [["field","fields"],["symbol","symbols"],["file","files"],["xpath","xpaths"]];
  order.forEach(([key,title]) => {
    const list = groups[key]; if (!list.length) return; any = true;
    box.appendChild(el("div","grp label", title));
    list.slice(0,8).forEach(({tok, idxs}) => {
      const r = el("div","res");
      r.innerHTML = `<span class="kindchip" style="--lc:var(--accent)">${idxs.length}</span><span>${esc(tok)}</span>`;
      r.addEventListener("click", () => {
        box.classList.remove("open"); $("#search").value = "";
        if (state.subjects.has(tok) && state.subjects.get(tok).producedBy.length) select(tok);
        else showEvidence(idxs);
      });
      box.appendChild(r);
    });
  });
  box.classList.toggle("open", any);
}

function setTheme(mode) {
  document.documentElement.setAttribute("data-theme", mode);
  try { localStorage.setItem("li-theme", mode); } catch(e){}

function currentTheme() {
  const set = document.documentElement.getAttribute("data-theme");
  if (set) return set;
  return matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light";
}

function wireEvents() {
  $("#loadBtn").addEventListener("click", () => $("#fileInput").click());
  $("#fileInput").addEventListener("change", e => { if (e.target.files.length) ingestFiles(e.target.files); });
  $("#filter").addEventListener("input", renderSidebar);
  document.querySelectorAll(".chip").forEach(c => c.addEventListener("click", () => {
    document.querySelectorAll(".chip").forEach(x => x.setAttribute("aria-pressed","false"));
    c.setAttribute("aria-pressed","true"); state.flt = c.dataset.flt; renderSidebar();
  }));
  document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", () => setTab(t.dataset.tab)));
  $("#themeBtn").addEventListener("click", () => setTheme(currentTheme()==="dark"?"light":"dark"));
  $("#bannerClose").addEventListener("click", () => banner(false));

  const search = $("#search");
  search.addEventListener("input", () => runSearch(search.value));
  search.addEventListener("keydown", e => { if (e.key === "Escape") { $("#results").classList.remove("open"); search.blur(); } });
  document.addEventListener("click", e => { if (!e.target.closest(".search-wrap")) $("#results").classList.remove("open"); });
  document.addEventListener("keydown", e => {
    if (e.key === "/" && document.activeElement.tagName !== "INPUT") { e.preventDefault(); search.focus(); }
  });

  // drag & drop anywhere
  const hint = $("#dropHint");
  window.addEventListener("dragover", e => { e.preventDefault(); hint.classList.add("show"); });
  window.addEventListener("dragleave", e => { if (e.relatedTarget === null) hint.classList.remove("show"); });
  window.addEventListener("drop", e => {
    e.preventDefault(); hint.classList.remove("show");
    if (e.dataTransfer.files.length) ingestFiles(e.dataTransfer.files);
  });

  try { const saved = localStorage.getItem("li-theme"); if (saved) setTheme(saved); } catch(e){}
}

boot();
</script>
</body>
</html>
