name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'lineage-frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./lineage-frontend
        run: npm ci

      - name: Run TypeScript check
        working-directory: ./lineage-frontend
        run: npm run build

      - name: Run tests
        working-directory: ./lineage-frontend
        run: npm run test -- run

      - name: Run e2e tests
        working-directory: ./lineage-frontend
        run: npm run playwright:test:ui

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-results
          path: lineage-frontend/test-results/

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: frontend-tests

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'lineage-frontend/package-lock.json'

      - name: Install dependencies
        working-directory: ./lineage-frontend
        run: npm ci

      - name: Build
        working-directory: ./lineage-frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v3
        with:
          name: frontend-build
          path: lineage-frontend/dist/

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'lineage-frontend/package-lock.json'

      - name: Run npm audit
        working-directory: ./lineage-frontend
        run: npm audit --audit-level=moderate || true

      - name: Check for vulnerabilities
        working-directory: ./lineage-frontend
        run: npm audit --production

  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [ frontend-tests, frontend-build ]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/lineage-frontend
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./lineage-frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
